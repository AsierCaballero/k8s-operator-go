apiVersion: v1
kind: Namespace
metadata:
  name: k8s-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-operator-go
  namespace: k8s-operator-system
  labels:
    app.kubernetes.io/name: k8s-operator-go
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-operator-go
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-operator-go
    spec:
      serviceAccountName: k8s-operator-go
      containers:
        - name: manager
          image: ghcr.io/asiercaballero/k8s-operator-go:latest
          command:
            - /manager
          args:
            - --leader-elect=true
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
            - containerPort: 9443
              name: webhook
              protocol: TCP
          env:
            - name: ENABLE_WEBHOOKS
              value: "true"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      terminationGracePeriodSeconds: 10
