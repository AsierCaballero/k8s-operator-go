apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: appdeployments.api.asier.dev
spec:
  group: api.asier.dev
  names:
    kind: AppDeployment
    listKind: AppDeploymentList
    plural: appdeployments
    singular: appdeployment
    shortNames:
      - appdep
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - image
                - port
              properties:
                image:
                  type: string
                replicas:
                  type: integer
                  minimum: 1
                  default: 1
                port:
                  type: integer
                env:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                resources:
                  type: object
                  properties:
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                strategy:
                  type: string
                  enum:
                    - Rolling
                    - Recreate
                    - BlueGreen
                  default: Rolling
                canary:
                  type: object
                  properties:
                    steps:
                      type: array
                      items:
                        type: object
                        properties:
                          weight:
                            type: integer
                          replicas:
                            type: integer
                    trafficIngress:
                      type: boolean
                ingress:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    host:
                      type: string
                    path:
                      type: string
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
            status:
              type: object
              properties:
                availableReplicas:
                  type: integer
                readyReplicas:
                  type: integer
                phase:
                  type: string
                message:
                  type: string
                observedGeneration:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                      lastTransitionTime:
                        type: string
                        format: date-time
